<!DOCTYPE html>
<html>
<head>
  <title>Download intro</title>
</head>
<body>
  <script>
    function downloadVideo() {
      var link = document.createElement('a');
      link.href = 'https://thesomov.com/Introduction.mp4';
      link.style.display = 'none';
      link.download = 'Introduction.mp4';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    window.onload = function() {
      downloadVideo();
    }
  </script>
</body>
</html>
