  <title>Download intro</title>
  <script>
    window.onload = function() {
      var link = document.createElement('a');
      link.href = 'https://thesomov.com/Introduction.mp4';
      link.download = 'https://thesomov.com/Introduction.mp4'; // Замените на желаемое имя файла с расширением
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</head>
