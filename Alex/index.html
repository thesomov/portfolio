<a id="downloadLink" href="/Alex.conf" download="Alex.conf">Скачать Alex.conf</a>

<script>
  // Этот код гарантирует скачивание файла
  // вместо показа в браузере, если это возможно
  const link = document.getElementById('downloadLink');
  link.addEventListener('click', (event) => {
    // Останавливаем переход по ссылке
    event.preventDefault();

    // Создаем временную ссылку
    const tempLink = document.createElement('a');
    tempLink.href = link.href;
    tempLink.setAttribute('download', 'Alex.conf');
    tempLink.style.display = 'none';

    // Добавляем ссылку на страницу и кликаем по ней
    document.body.appendChild(tempLink);
    tempLink.click();

    // Удаляем временную ссылку
    document.body.removeChild(tempLink);
  });
</script>
