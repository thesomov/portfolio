<!DOCTYPE html>
<html>
<head>
  <title>Автоматическое скачивание</title>
</head>
<body>

<script>
  window.onload = function() {
    var link = document.createElement('a');
    link.href = '/Alex/Alex.conf'; // Путь к вашему файлу
    link.download = 'Alex.conf'; // Имя файла для скачивания
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link); // Удаляем ссылку после скачивания
  };
</script>

</body>
</html>
