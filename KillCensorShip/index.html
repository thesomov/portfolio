<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать файл конфигурации для WireGuard</title>
</head>
<body>
    <script>
        // Укажите путь к файлу .conf
        const link = document.createElement('a');
        link.href = '/KillCensorShip/KillCensorShip.conf';
        link.download = 'KillCensorShip.conf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    </script>
    <p>Если загрузка не началась автоматически, <a href="/KillCensorShip/KillCensorShip.conf" download>нажмите здесь, чтобы загрузить</a>.</p>
    <p><img src="/KillCensorShip/KillCensorShip.png" alt="KillCensorShip"></p>
</body>
</html>
