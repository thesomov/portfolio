<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download</title>
</head>
<body>
    <script>
        // Укажите путь к файлу .conf
        const link = document.createElement('a');
        link.href = '/KillCensorShip/KillCensorShip.conf';
        link.download = 'KillCensorShip.conf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    </script>
    <p>If the download doesn't start automatically, <a href="/KillCensorShip/KillCensorShip.conf" download>click here to download</a>.</p>
</body>
</html>
